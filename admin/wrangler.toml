name = "prism-admin"
main = "src/index.ts"
compatibility_date = "2024-12-01"
# Cloudflare Access protects the configured Admin custom domain. Do not expose
# a second origin that can bypass that Access application.
workers_dev = false
preview_urls = false

[limits]
cpu_ms = 30000

[version_metadata]
binding = "CF_VERSION_METADATA"

[build]
command = "cd .. && npm install"

# Serve the admin UI as static assets from the Worker
[assets]
directory = "./ui/dist"
not_found_handling = "single-page-application"
binding = "ASSETS"

[vars]
# Comma-separated list of curator emails
CURATOR_EMAILS = "z54981220@gmail.com"
# D1 bindings do not expose their database IDs at runtime. Keep these public,
# non-secret fingerprint values exactly aligned with the bindings below.
VOD_EXPORT_DB_ID = "92d81cb5-d307-4fc3-b55c-49b5a29ed729"
VOD_EXPORT_NOVA_DB_ID = "ebf4d5ff-68f9-4e2e-b95c-9afefd0cbc0c"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[[d1_databases]]
binding = "DB"
database_name = "oshi-prism-db"
database_id = "92d81cb5-d307-4fc3-b55c-49b5a29ed729"
migrations_dir = "migrations"

[[d1_databases]]
binding = "NOVA_DB"
database_name = "oshi-prism-nova"
database_id = "ebf4d5ff-68f9-4e2e-b95c-9afefd0cbc0c"
migrations_dir = "../tools/nova/migrations"

[[d1_databases]]
binding = "CRYSTAL_DB"
database_name = "oshi-crystal"
database_id = "2d3e6cc0-a54a-483e-a819-0c552347265b"

[[r2_buckets]]
binding = "VOD_EXPORT_PUBLIC"
bucket_name = "prism-vod-export-public"

[[r2_buckets]]
binding = "VOD_EXPORT_PRIVATE"
bucket_name = "prism-vod-export-private"
